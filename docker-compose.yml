version: "3.8"
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartjob_auth
    ports:
      - "3306:3306"

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql

  job-service:
    build: ./job-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql
