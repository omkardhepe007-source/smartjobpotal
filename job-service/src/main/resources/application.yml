server:
  port: ${PORT:8082}

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:smartjob_jobs;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
